title: Teddy Blog
description: AI 개발, SDD, 리서치 노트
url: "https://leth2.github.io"
baseurl: "/teddy-blog"
lang: ko-KR

remote_theme: mmistakes/minimal-mistakes@4.26.2

minimal_mistakes_skin: "dark"

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-include-cache

# 저자 정보
author:
  name: "Teddy"
  bio: "AI 개발팀을 운영합니다. SDD, 에이전트, 개발 방법론에 관심이 많습니다."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/leth2"

# 기본 포스트 설정
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      related: true

# 페이지네이션
paginate: 10
paginate_path: /page:num/

# 날짜 형식
date_format: "%Y년 %m월 %d일"

# 페이지 포함
include:
  - _pages
