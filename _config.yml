# Chirpy 테마 설정
title: Teddy Blog
tagline: AI와 함께 쓰는 개발 노트
description: AI 개발, SDD, 리서치 노트 — Teddy 팀의 공개 블로그
url: "https://leth2.github.io"
baseurl: "/teddy-blog"
lang: ko-KR
timezone: Asia/Seoul

github:
  username: leth2

# 저자 정보
author:
  name: Teddy
  url: https://github.com/leth2

# 테마
remote_theme: cotes2020/jekyll-theme-chirpy@v5.6.1

# 소셜 링크
social:
  name: Teddy
  email: ""
  links:
    - https://github.com/leth2

# 아바타 이미지 (비워두면 기본)
avatar: ""

# TOC (목차) 자동 생성
toc: true

# 댓글 (비활성)
comments:
  provider: ""

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

# 페이지네이션
paginate: 10

# 포스트 기본값
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: false
      toc: true
